<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Engineering: Getting Better Results from AI</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg-deep: #080E1A;
  --bg: #0D1526;
  --bg-card: #141E36;
  --bg-card-alt: #1A2844;
  --primary: #6C8EFF;
  --primary-dim: rgba(108,142,255,0.15);
  --secondary: #A78BFA;
  --secondary-dim: rgba(167,139,250,0.12);
  --accent: #F5A623;
  --accent-dim: rgba(245,166,35,0.12);
  --success: #34D399;
  --success-dim: rgba(52,211,153,0.12);
  --danger: #F87171;
  --danger-dim: rgba(248,113,113,0.12);
  --text: #F1F5F9;
  --text-sec: #94A3B8;
  --text-muted: #5A6A8A;
  --border: #1E3055;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.3s ease;
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 18px; scroll-behavior: smooth; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  line-height: 1.6;
}

/* ===== App Layout ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  position: relative;
}

/* ===== Progress Bar ===== */
#progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: var(--border);
  z-index: 100;
}
#progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  transition: width 0.4s ease;
  border-radius: 0 2px 2px 0;
}

/* ===== TOC Sidebar ===== */
#toc-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}
#toc-overlay.active { opacity: 1; pointer-events: all; }
#toc-sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 340px;
  max-width: 85vw;
  height: 100vh;
  background: var(--bg);
  border-right: 1px solid var(--border);
  z-index: 210;
  transform: translateX(-100%);
  transition: transform 0.35s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#toc-sidebar.active { transform: translateX(0); }
#toc-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#toc-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
#toc-close {
  background: none; border: none; color: var(--text-sec); cursor: pointer;
  font-size: 1.4rem; padding: 4px 8px; border-radius: var(--radius-sm);
  transition: color var(--transition), background var(--transition);
}
#toc-close:hover { color: var(--text); background: var(--primary-dim); }
#toc-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
  list-style: none;
}
#toc-list li { padding: 0; }
#toc-list button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 10px 20px;
  background: none;
  border: none;
  color: var(--text-sec);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition);
  border-left: 3px solid transparent;
  font-family: inherit;
  line-height: 1.4;
}
#toc-list button:hover { color: var(--text); background: var(--primary-dim); }
#toc-list button.active {
  color: var(--primary);
  border-left-color: var(--primary);
  background: var(--primary-dim);
  font-weight: 600;
}
#toc-list .toc-section {
  padding: 14px 20px 6px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}

/* ===== Slide Area ===== */
#slide-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 60px 80px;
}
/* Decorative background blobs */
#slide-area::before {
  content: '';
  position: absolute;
  top: -15%;
  right: -8%;
  width: 55%;
  height: 55%;
  background: radial-gradient(circle, rgba(108,142,255,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
#slide-area::after {
  content: '';
  position: absolute;
  bottom: -10%;
  left: -8%;
  width: 45%;
  height: 45%;
  background: radial-gradient(circle, rgba(245,166,35,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

#slide-content {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 1100px;
  max-height: 100%;
  overflow-y: auto;
  transition: opacity 0.32s ease, transform 0.32s ease;
  opacity: 1;
  transform: translateX(0);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#slide-content.exit-left { opacity: 0; transform: translateX(-50px); }
#slide-content.exit-right { opacity: 0; transform: translateX(50px); }
#slide-content.enter-left { opacity: 0; transform: translateX(-50px); }
#slide-content.enter-right { opacity: 0; transform: translateX(50px); }

/* ===== Staggered entrance animation ===== */
.stagger > * {
  opacity: 0;
  animation: fadeUp 0.45s ease forwards;
}
.stagger > *:nth-child(1) { animation-delay: 0.06s; }
.stagger > *:nth-child(2) { animation-delay: 0.12s; }
.stagger > *:nth-child(3) { animation-delay: 0.18s; }
.stagger > *:nth-child(4) { animation-delay: 0.24s; }
.stagger > *:nth-child(5) { animation-delay: 0.30s; }
.stagger > *:nth-child(6) { animation-delay: 0.36s; }
.stagger > *:nth-child(7) { animation-delay: 0.42s; }
.stagger > *:nth-child(8) { animation-delay: 0.48s; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Navigation Bar ===== */
#nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: rgba(13,21,38,0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 90;
}
.nav-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-sec);
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-btn:hover { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }
.nav-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn:disabled:hover { background: var(--bg-card); color: var(--text-sec); border-color: var(--border); }
#slide-counter {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  min-width: 80px;
  text-align: center;
}
#nav-controls { display: flex; gap: 6px; }
.ctrl-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-sec);
  width: 38px;
  height: 38px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.ctrl-btn:hover { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }
.ctrl-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.ctrl-btn.active { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }

/* ===== Speaker Notes ===== */
#speaker-notes {
  position: fixed;
  bottom: 60px;
  left: 0;
  width: 100%;
  max-height: 0;
  background: rgba(13,21,38,0.96);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  overflow: hidden;
  transition: max-height 0.4s ease, padding 0.4s ease;
  z-index: 85;
  padding: 0 24px;
}
#speaker-notes.open { max-height: 200px; padding: 16px 24px; overflow-y: auto; }
#notes-header {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 8px;
}
#notes-content { font-size: 0.85rem; color: var(--text-sec); line-height: 1.6; }

/* ===== Typography ===== */
.slide-title {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 24px;
  line-height: 1.2;
  color: var(--text);
}
.slide-subtitle {
  font-size: 1.1rem;
  color: var(--text-sec);
  margin-bottom: 20px;
  line-height: 1.5;
}
.slide-topic {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.slide-topic::before {
  content: '';
  width: 4px;
  height: 22px;
  background: var(--primary);
  border-radius: 2px;
  flex-shrink: 0;
}
h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
p { margin-bottom: 12px; color: var(--text-sec); }
ul, ol { padding-left: 24px; margin-bottom: 12px; color: var(--text-sec); }
li { margin-bottom: 6px; }
strong { color: var(--text); font-weight: 700; }
em { color: var(--primary); font-style: italic; }
code {
  background: var(--bg-card-alt);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.88em;
  color: var(--accent);
  font-family: 'Consolas', 'Monaco', monospace;
}

/* ===== Cards ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.card:hover { border-color: rgba(108,142,255,0.3); box-shadow: 0 2px 16px rgba(108,142,255,0.06); }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 14px;
}
.card-accent {
  border-left: 4px solid var(--primary);
}
.card-accent-warn {
  border-left: 4px solid var(--accent);
}
.card-accent-success {
  border-left: 4px solid var(--success);
}
.card-accent-danger {
  border-left: 4px solid var(--danger);
}

/* ===== Prompt Compare Blocks ===== */
.prompt-compare { margin-bottom: 8px; }
.prompt-card {
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 12px;
  position: relative;
}
.prompt-card .card-label {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 2px 10px;
  border-radius: 20px;
  margin-bottom: 10px;
}
.prompt-card.weak {
  background: var(--danger-dim);
  border: 1px solid rgba(248,113,113,0.2);
}
.prompt-card.weak .card-label { background: rgba(248,113,113,0.2); color: var(--danger); }
.prompt-card.weak p { color: var(--text-sec); font-style: italic; }
.prompt-card.improved {
  background: var(--success-dim);
  border: 1px solid rgba(52,211,153,0.2);
}
.prompt-card.improved .card-label { background: rgba(52,211,153,0.2); color: var(--success); }
.prompt-card p { margin: 0; line-height: 1.55; font-size: 0.95rem; }
.why-box {
  background: var(--primary-dim);
  border: 1px solid rgba(108,142,255,0.2);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 12px;
}
.why-box strong { color: var(--primary); }
.why-box p { margin: 0; font-size: 0.9rem; }

/* ===== Reveal Button ===== */
.reveal-btn {
  background: var(--bg-card-alt);
  border: 1px dashed var(--border);
  color: var(--primary);
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 600;
  width: 100%;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.reveal-btn:hover { background: var(--primary-dim); border-color: var(--primary); border-style: solid; }
.reveal-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.reveal-hidden { display: none; }
.reveal-hidden.revealed {
  display: block;
  animation: fadeUp 0.4s ease forwards;
}

/* ===== Expandable Sections ===== */
.expandable { margin-bottom: 10px; border-radius: var(--radius); overflow: hidden; }
.expand-trigger {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--text);
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 600;
  text-align: left;
  transition: all var(--transition);
}
.expand-trigger:hover { background: var(--bg-card-alt); border-color: var(--primary); }
.expand-trigger:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
.expand-trigger .arrow {
  transition: transform var(--transition);
  color: var(--text-muted);
  font-size: 0.8rem;
}
.expand-trigger.active { border-color: var(--primary); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
.expand-trigger.active .arrow { transform: rotate(180deg); color: var(--primary); }
.expand-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease, padding 0.3s ease;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  padding: 0 18px;
}
.expand-body.open { max-height: 500px; padding: 14px 18px; }
.expand-body p, .expand-body ul, .expand-body ol { font-size: 0.9rem; }
.expand-body code { font-size: 0.82rem; }

/* ===== Title Slide ===== */
.title-slide {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
}
.title-slide .main-title {
  font-size: 3rem;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent), var(--primary));
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradShift 8s ease-in-out infinite;
}
@keyframes gradShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.title-slide .subtitle {
  font-size: 1.2rem;
  color: var(--text-sec);
  font-weight: 400;
  max-width: 550px;
  line-height: 1.5;
}
.title-slide .title-decor {
  width: 80px;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  border-radius: 2px;
  margin: 28px auto 0;
}

/* ===== Anatomy Diagram ===== */
.anatomy-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 16px 0;
}
.anatomy-item {
  display: flex;
  align-items: stretch;
  gap: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: all var(--transition);
}
.anatomy-item:hover { border-color: rgba(108,142,255,0.35); transform: translateX(4px); }
.anatomy-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  font-weight: 800;
  flex-shrink: 0;
  color: #fff;
}
.anatomy-icon.goal { background: linear-gradient(135deg, #6C8EFF, #4A6FE0); }
.anatomy-icon.context { background: linear-gradient(135deg, #A78BFA, #8B5CF6); }
.anatomy-icon.audience { background: linear-gradient(135deg, #F5A623, #E08D0D); }
.anatomy-icon.constraints { background: linear-gradient(135deg, #F87171, #DC2626); }
.anatomy-icon.format { background: linear-gradient(135deg, #34D399, #059669); }
.anatomy-text h3 { margin-bottom: 4px; font-size: 1rem; }
.anatomy-text p { margin: 0; font-size: 0.88rem; color: var(--text-sec); }

/* ===== Technique Badges ===== */
.tech-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-right: 6px;
  margin-bottom: 4px;
}
.badge-basic { background: var(--primary-dim); color: var(--primary); }
.badge-intermediate { background: var(--secondary-dim); color: var(--secondary); }
.badge-advanced { background: var(--accent-dim); color: var(--accent); }

/* ===== Cheat Sheet ===== */
.cheat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 16px 0;
}
.cheat-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  transition: all var(--transition);
}
.cheat-item:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 6px 20px rgba(108,142,255,0.1); }
.cheat-letter {
  font-size: 2.2rem;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 6px;
}
.cheat-letter.l-g { color: var(--primary); }
.cheat-letter.l-c { color: var(--secondary); }
.cheat-letter.l-a { color: var(--accent); }
.cheat-letter.l-c2 { color: var(--danger); }
.cheat-letter.l-f { color: var(--success); }
.cheat-letter.l-f2 { color: #60A5FA; }
.cheat-word { font-size: 0.85rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.cheat-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; }

/* ===== Closing Slide ===== */
.closing-slide {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 55vh;
}
.takeaway-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  text-align: left;
  margin-bottom: 18px;
  max-width: 600px;
}
.takeaway-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1rem;
  flex-shrink: 0;
}
.takeaway-text { font-size: 1.05rem; color: var(--text-sec); line-height: 1.5; padding-top: 4px; }
.closing-quote {
  margin-top: 30px;
  padding: 20px 30px;
  border-left: 4px solid var(--accent);
  background: var(--accent-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
  max-width: 650px;
}
.closing-quote p {
  font-size: 1.1rem;
  color: var(--accent);
  font-weight: 600;
  font-style: italic;
  margin: 0;
}

/* ===== Mistake Cards ===== */
.mistake-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: var(--danger-dim);
  border: 1px solid rgba(248,113,113,0.15);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
}
.mistake-x {
  color: var(--danger);
  font-weight: 900;
  font-size: 1.1rem;
  flex-shrink: 0;
  margin-top: 1px;
}
.mistake-item p { margin: 0; font-size: 0.92rem; }

/* ===== Progressive Example ===== */
.progressive-steps { display: flex; flex-direction: column; gap: 12px; margin: 16px 0; }
.prog-step {
  padding: 16px 20px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  position: relative;
}
.prog-step .step-num {
  position: absolute;
  top: -10px;
  left: 16px;
  background: var(--bg);
  padding: 0 8px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-radius: 4px;
}
.prog-step.step-1 { background: var(--danger-dim); border-color: rgba(248,113,113,0.2); }
.prog-step.step-1 .step-num { color: var(--danger); }
.prog-step.step-2 { background: var(--accent-dim); border-color: rgba(245,166,35,0.2); }
.prog-step.step-2 .step-num { color: var(--accent); }
.prog-step.step-3 { background: var(--success-dim); border-color: rgba(52,211,153,0.2); }
.prog-step.step-3 .step-num { color: var(--success); }
.prog-step p { margin: 0; font-size: 0.95rem; }
.prog-step .step-note { font-size: 0.82rem; color: var(--text-muted); margin-top: 6px; }

/* ===== Exercise Slide ===== */
.exercise-prompt {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
}
.exercise-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 8px;
}
.exercise-prompt p { margin: 0; font-style: italic; color: var(--text-sec); }

/* ===== Two Column ===== */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 12px 0;
}

/* ===== Highlight Text ===== */
.hl { color: var(--primary); font-weight: 700; }
.hl-warn { color: var(--accent); font-weight: 700; }
.hl-ok { color: var(--success); font-weight: 700; }
.hl-bad { color: var(--danger); font-weight: 700; }

/* ===== Dividers ===== */
.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  html { font-size: 16px; }
  #slide-area { padding: 24px 20px 80px; }
  .slide-title { font-size: 1.5rem; }
  .title-slide .main-title { font-size: 2rem; }
  .two-col { grid-template-columns: 1fr; }
  .cheat-grid { grid-template-columns: repeat(2, 1fr); }
  .card-grid { grid-template-columns: 1fr; }
  .anatomy-item { padding: 12px; }
  .anatomy-icon { width: 40px; height: 40px; font-size: 1.1rem; }
}
@media (max-width: 480px) {
  .cheat-grid { grid-template-columns: 1fr 1fr; }
  .nav-btn { padding: 8px 12px; font-size: 0.8rem; }
}

/* ===== Fullscreen adjustments ===== */
:fullscreen #app, :-webkit-full-screen #app {
  height: 100vh;
  width: 100vw;
}

/* ===== Reduced motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ===== Scrollbar ===== */
#slide-content::-webkit-scrollbar { width: 6px; }
#slide-content::-webkit-scrollbar-track { background: transparent; }
#slide-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#slide-content::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
#toc-list::-webkit-scrollbar { width: 4px; }
#toc-list::-webkit-scrollbar-track { background: transparent; }
#toc-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ===== Focus visible ===== */
*:focus { outline: none; }
*:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

/* ===== SVG Icons inline helper ===== */
.icon-svg { width: 18px; height: 18px; vertical-align: middle; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>

/* ============================================================
   STATE & DOM REFERENCES
   ============================================================ */
let currentSlide = 0;
let isTransitioning = false;
let notesOpen = false;
let tocOpen = false;

const slideContent = document.getElementById('slide-content');
const progressFill = document.getElementById('progress-fill');
const slideCounter = document.getElementById('slide-counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnToc = document.getElementById('btn-toc');
const btnNotes = document.getElementById('btn-notes');
const btnFullscreen = document.getElementById('btn-fullscreen');
const tocSidebar = document.getElementById('toc-sidebar');
const tocOverlay = document.getElementById('toc-overlay');
const tocClose = document.getElementById('toc-close');
const tocList = document.getElementById('toc-list');
const speakerNotes = document.getElementById('speaker-notes');
const notesContent = document.getElementById('notes-content');

/* ============================================================
   BUILD TABLE OF CONTENTS
   ============================================================ */
function buildTOC() {
  let currentSection = '';
  slides.forEach((slide, i) => {
    // Add section header when section changes
    if (slide.section && slide.section !== currentSection) {
      currentSection = slide.section;
      const li = document.createElement('li');
      li.className = 'toc-section';
      li.textContent = currentSection;
      tocList.appendChild(li);
    }
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.textContent = slide.title;
    btn.setAttribute('aria-label', 'Go to slide: ' + slide.title);
    btn.addEventListener('click', () => {
      goToSlide(i);
      closeTOC();
    });
    li.appendChild(btn);
    tocList.appendChild(li);
  });
}

/* ============================================================
   RENDER SLIDE
   ============================================================ */
function renderSlide() {
  const slide = slides[currentSlide];
  slideContent.innerHTML = slide.content;
  notesContent.innerHTML = slide.notes;

  // Update progress
  const pct = ((currentSlide + 1) / slides.length) * 100;
  progressFill.style.width = pct + '%';

  // Update counter
  slideCounter.textContent = (currentSlide + 1) + ' / ' + slides.length;

  // Update nav buttons
  btnPrev.disabled = currentSlide === 0;
  btnNext.disabled = currentSlide === slides.length - 1;

  // Update TOC active state
  const tocButtons = tocList.querySelectorAll('button');
  let btnIndex = 0;
  tocButtons.forEach((btn) => {
    // Map button index to slide index (skip section headers)
    btn.classList.remove('active');
  });
  // Find the correct TOC button by matching slide index
  let tocBtnIdx = 0;
  for (let i = 0; i <= currentSlide; i++) {
    if (slides[i].section && (i === 0 || slides[i].section !== slides[i-1].section)) {
      // This is a section header, skip it in button count
    }
    tocBtnIdx = i;
  }
  // Simpler approach: count only non-section items
  let slideOnlyIdx = 0;
  for (let i = 0; i < slides.length; i++) {
    if (i === currentSlide) {
      const allBtns = tocList.querySelectorAll('button');
      if (allBtns[slideOnlyIdx]) allBtns[slideOnlyIdx].classList.add('active');
      break;
    }
    slideOnlyIdx++;
  }

  // Scroll slide content to top
  slideContent.scrollTop = 0;
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function navigateTo(index, direction) {
  if (isTransitioning || index === currentSlide) return;
  if (index < 0 || index >= slides.length) return;

  isTransitioning = true;

  const exitClass = direction === 'next' ? 'exit-left' : 'exit-right';
  const enterClass = direction === 'next' ? 'enter-right' : 'enter-left';

  // Exit current slide
  slideContent.classList.add(exitClass);

  setTimeout(() => {
    currentSlide = index;
    slideContent.classList.remove(exitClass);
    slideContent.classList.add(enterClass);
    renderSlide();

    // Force reflow before removing enter class
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        slideContent.classList.remove(enterClass);
        isTransitioning = false;
      });
    });
  }, 320);
}

function nextSlide() {
  if (currentSlide < slides.length - 1) {
    navigateTo(currentSlide + 1, 'next');
  }
}

function prevSlide() {
  if (currentSlide > 0) {
    navigateTo(currentSlide - 1, 'prev');
  }
}

function goToSlide(index) {
  const direction = index > currentSlide ? 'next' : 'prev';
  navigateTo(index, direction);
}

/* ============================================================
   TOC
   ============================================================ */
function openTOC() {
  tocOpen = true;
  tocSidebar.classList.add('active');
  tocOverlay.classList.add('active');
  tocOverlay.setAttribute('aria-hidden', 'false');
  btnToc.classList.add('active');
  // Focus first button
  const firstBtn = tocList.querySelector('button');
  if (firstBtn) firstBtn.focus();
}

function closeTOC() {
  tocOpen = false;
  tocSidebar.classList.remove('active');
  tocOverlay.classList.remove('active');
  tocOverlay.setAttribute('aria-hidden', 'true');
  btnToc.classList.remove('active');
}

function toggleTOC() {
  tocOpen ? closeTOC() : openTOC();
}

/* ============================================================
   SPEAKER NOTES
   ============================================================ */
function toggleNotes() {
  notesOpen = !notesOpen;
  speakerNotes.classList.toggle('open', notesOpen);
  btnNotes.classList.toggle('active', notesOpen);
}

/* ============================================================
   FULLSCREEN
   ============================================================ */
function toggleFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    const el = document.documentElement;
    if (el.requestFullscreen) {
      el.requestFullscreen();
    } else if (el.webkitRequestFullscreen) {
      el.webkitRequestFullscreen();
    }
    btnFullscreen.classList.add('active');
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    }
    btnFullscreen.classList.remove('active');
  }
}

// Update fullscreen button state when fullscreen changes
document.addEventListener('fullscreenchange', () => {
  btnFullscreen.classList.toggle('active', !!document.fullscreenElement);
});
document.addEventListener('webkitfullscreenchange', () => {
  btnFullscreen.classList.toggle('active', !!document.webkitFullscreenElement);
});

/* ============================================================
   INTERACTIVE ELEMENTS (Event Delegation)
   ============================================================ */
document.getElementById('slide-area').addEventListener('click', (e) => {
  // Reveal trigger
  const revealTrigger = e.target.closest('[data-reveal-trigger]');
  if (revealTrigger) {
    const container = revealTrigger.closest('.prompt-compare') ||
                      revealTrigger.closest('.progressive-steps') ||
                      revealTrigger.parentElement;
    const hidden = container.querySelector('.reveal-hidden:not(.revealed)');
    if (hidden) {
      hidden.classList.add('revealed');
      if (!container.querySelector('.reveal-hidden:not(.revealed)')) {
        revealTrigger.style.display = 'none';
      }
    }
    return;
  }

  // Expand trigger
  const expandTrigger = e.target.closest('[data-expand-trigger]');
  if (expandTrigger) {
    const body = expandTrigger.nextElementSibling;
    const isOpen = body.classList.contains('open');
    expandTrigger.classList.toggle('active', !isOpen);
    body.classList.toggle('open', !isOpen);
    expandTrigger.setAttribute('aria-expanded', !isOpen);
    return;
  }
});

/* ============================================================
   KEYBOARD NAVIGATION
   ============================================================ */
document.addEventListener('keydown', (e) => {
  // Skip if typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  switch(e.key) {
    case 'ArrowRight':
    case 'ArrowDown':
    case ' ':
      e.preventDefault();
      nextSlide();
      break;
    case 'ArrowLeft':
    case 'ArrowUp':
      e.preventDefault();
      prevSlide();
      break;
    case 'Home':
      e.preventDefault();
      goToSlide(0);
      break;
    case 'End':
      e.preventDefault();
      goToSlide(slides.length - 1);
      break;
    case 'Escape':
      if (tocOpen) closeTOC();
      break;
    case 't':
    case 'T':
      if (!e.ctrlKey && !e.metaKey) toggleTOC();
      break;
    case 'n':
    case 'N':
      if (!e.ctrlKey && !e.metaKey) toggleNotes();
      break;
    case 'f':
    case 'F':
      if (!e.ctrlKey && !e.metaKey) toggleFullscreen();
      break;
  }
});

/* ============================================================
   BUTTON EVENT LISTENERS
   ============================================================ */
btnPrev.addEventListener('click', prevSlide);
btnNext.addEventListener('click', nextSlide);
btnToc.addEventListener('click', toggleTOC);
btnNotes.addEventListener('click', toggleNotes);
btnFullscreen.addEventListener('click', toggleFullscreen);
tocClose.addEventListener('click', closeTOC);
tocOverlay.addEventListener('click', closeTOC);

/* ============================================================
   TOUCH SWIPE SUPPORT
   ============================================================ */
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;
  // Only trigger if horizontal swipe is dominant and exceeds threshold
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
    if (dx < 0) nextSlide();
    else prevSlide();
  }
}, { passive: true });

/* ============================================================
   INIT
   ============================================================ */
buildTOC();
renderSlide();
</script>
